// Peak-preserving downsample: keep max |value| per bucket
function downsamplePeaks(values, times, target) {
    const n = values.length;
    const bucketSize = Math.floor(n / target);
    const rv = [], rt = [];
    for (let i = 0; i < target; i++) {
        const start = i * bucketSize;
        const end = Math.min(start + bucketSize, n);
        let maxIdx = start;
        for (let j = start + 1; j < end; j++) {
            if (Math.abs(values[j]) > Math.abs(values[maxIdx])) maxIdx = j;
        }
        rv.push(values[maxIdx]);
        rt.push(times[maxIdx]);
    }
    return { values: rv, times: rt };
}

function showManyWaveforms(g) {
    const stations = [...DATA.miniWaveforms].sort((a, b) => a.distance_km - b.distance_km);
    const cols = 5, rows = 4;
    const headerH = 22;
    const cellW = iW / cols;
    const cellH = (iH - headerH) / rows;
    const pad = 4;
    const cw = cellW - pad * 2;
    const ch = cellH - pad * 2;

    // Shared y-axis across all sparklines
    const globalMaxAbs = d3.max(stations, st =>
        d3.max(st.velocity, d => Math.abs(d))) || 1;

    // Group by bin
    const binned = [[], [], [], [], []];
    stations.forEach(st => binned[st.bin_index].push(st));

    // ── Hero: G140 full waveform → sparkline cell ──────────────────────
    const g140 = stations.find(s => s.station_id === 'G140');
    const g140Col = g140 ? g140.bin_index : 0;
    const g140Row = g140 ? binned[g140Col].indexOf(g140) : 1;
    const g140cx = g140Col * cellW + pad;
    const g140cy = headerH + g140Row * cellH + pad;

    // Downsample full waveform (2334 pts → 200 pts) — smooth sparkline
    const N_HERO = 200;
    const hero = downsamplePeaks(DATA.waveform.velocity, DATA.waveform.times, N_HERO);

    // Big scales: hero fills chart, own y-range for impact
    const heroPeak = d3.max(hero.values, d => Math.abs(d)) * 1.15;
    const bigPad = 10;
    const bigSx = d3.scaleLinear().domain(d3.extent(hero.times)).range([bigPad, iW - bigPad]);
    const bigSy = d3.scaleLinear().domain([-heroPeak, heroPeak])
        .range([iH - bigPad, headerH + bigPad]);

    // Small scales: fit in G140's grid cell, shared y-axis
    const smallSx = d3.scaleLinear().domain(d3.extent(hero.times))
        .range([g140cx + 4, g140cx + cw - 4]);
    const smallSy = d3.scaleLinear().domain([-globalMaxAbs, globalMaxAbs])
        .range([g140cy + ch * 0.82, g140cy + ch * 0.18]);

    const bigLine = d3.line().x((d, i) => bigSx(hero.times[i])).y(d => bigSy(d));
    const smallLine = d3.line().x((d, i) => smallSx(hero.times[i])).y(d => smallSy(d));

    // Cell background (behind hero path, fades in during shrink)
    const cellBg = g.append('rect')
        .attr('x', g140cx).attr('y', g140cy)
        .attr('width', cw).attr('height', ch)
        .attr('rx', 4)
        .attr('fill', '#fff')
        .attr('stroke', '#E3E0DB')
        .attr('opacity', 0);
    cellBg.transition().delay(600).duration(400).attr('opacity', 1);

    // Hero waveform at full chart size
    const heroPath = g.append('path')
        .datum(hero.values)
        .attr('fill', 'none')
        .attr('stroke', COLORS.vel)
        .attr('stroke-width', 2)
        .attr('d', bigLine);

    // Shrink to cell position
    heroPath.transition()
        .delay(400)
        .duration(900)
        .ease(d3.easeCubicInOut)
        .attr('d', smallLine)
        .attr('stroke-width', 1.3);

    // G140 labels appear after shrink
    const labelDelay = 1300;
    g.append('text')
        .attr('x', g140cx + 6).attr('y', g140cy + 13)
        .attr('font-size', '8px').attr('font-weight', '600').attr('fill', COLORS.muted)
        .attr('opacity', 0)
        .text(`G140 · ${g140 ? g140.distance_km.toFixed(1) : '1.2'} km`)
        .transition().delay(labelDelay).duration(300).attr('opacity', 1);
    g.append('text')
        .attr('x', g140cx + cw - 4).attr('y', g140cy + ch - 4)
        .attr('text-anchor', 'end')
        .attr('font-size', '9px').attr('font-weight', '700').attr('fill', COLORS.vel)
        .attr('opacity', 0)
        .text(`${g140 ? g140.pgv_mms.toFixed(1) : '9.9'} mm/s`)
        .transition().delay(labelDelay).duration(300).attr('opacity', 1);

    // G140 hover (on the background rect)
    cellBg.on('mouseenter', function(event) {
        d3.select(this).attr('stroke', COLORS.vel).attr('stroke-width', 1.5);
        showTip(`<b>G140</b><br>${g140 ? g140.distance_km.toFixed(1) : '1.2'} km<br>PGV: ${g140 ? g140.pgv_mms.toFixed(2) : '9.88'} mm/s`, event);
    })
    .on('mousemove', event => showTip(`<b>G140</b><br>${g140 ? g140.distance_km.toFixed(1) : '1.2'} km<br>PGV: ${g140 ? g140.pgv_mms.toFixed(2) : '9.88'} mm/s`, event))
    .on('mouseleave', function(event) {
        d3.select(this).attr('stroke', '#E3E0DB').attr('stroke-width', 1);
        hideTip(event);
    }).style('cursor', 'pointer');

    // ── Column headers + other cells ───────────────────────────────────
    const otherDelay = 1000;

    const BIN_LABELS_KM = ['0–5 km', '5–10 km', '10–20 km', '20–30 km', '30–50 km'];
    BIN_LABELS_KM.forEach((label, ci) => {
        g.append('text')
            .attr('x', ci * cellW + cellW / 2)
            .attr('y', 14)
            .attr('text-anchor', 'middle')
            .attr('font-size', '10px')
            .attr('font-weight', '700')
            .attr('fill', COLORS.muted)
            .attr('opacity', 0)
            .text(label)
            .transition().delay(otherDelay).duration(400).attr('opacity', 1);
    });

    let dotIndex = 0;
    binned.forEach((binStations, col) => {
        binStations.forEach((st, row) => {
            if (st.station_id === 'G140') { dotIndex++; return; }
            const idx = dotIndex++;
            const cx = col * cellW + pad;
            const cy = headerH + row * cellH + pad;
            const w = cellW - pad * 2;
            const h = cellH - pad * 2;

            const cell = g.append('g')
                .attr('class', 'mini-cell')
                .attr('transform', `translate(${cx},${cy})`)
                .attr('opacity', 0);

            // Background
            const bg = cell.append('rect')
                .attr('width', w).attr('height', h)
                .attr('rx', 4)
                .attr('fill', '#fff')
                .attr('stroke', '#E3E0DB');

            // Hover
            cell.on('mouseenter', function(event) {
                bg.attr('stroke', COLORS.vel).attr('stroke-width', 1.5);
                showTip(`<b>${st.station_id}</b><br>${st.distance_km.toFixed(1)} km<br>PGV: ${st.pgv_mms.toFixed(2)} mm/s`, event);
            })
            .on('mousemove', event => showTip(`<b>${st.station_id}</b><br>${st.distance_km.toFixed(1)} km<br>PGV: ${st.pgv_mms.toFixed(2)} mm/s`, event))
            .on('mouseleave', (event) => { bg.attr('stroke', '#E3E0DB').attr('stroke-width', 1); hideTip(event); })
            .style('cursor', 'pointer');

            // Waveform — shared y-scale
            const vel = st.velocity;
            const times = st.times;
            const sx = d3.scaleLinear().domain(d3.extent(times)).range([4, w - 4]);
            const sy = d3.scaleLinear().domain([-globalMaxAbs, globalMaxAbs]).range([h * 0.82, h * 0.18]);

            const wavePath = cell.append('path')
                .datum(vel)
                .attr('fill', 'none')
                .attr('stroke', COLORS.vel)
                .attr('stroke-width', 1.3)
                .attr('d', d3.line().x((d, j) => sx(times[j])).y(d => sy(d)));

            // Draw animation
            const pathLen = wavePath.node().getTotalLength();
            wavePath
                .attr('stroke-dasharray', pathLen)
                .attr('stroke-dashoffset', pathLen)
                .transition()
                .delay(otherDelay + idx * 50 + 200)
                .duration(800)
                .ease(d3.easeCubicOut)
                .attr('stroke-dashoffset', 0);

            // Labels
            cell.append('text')
                .attr('x', 6).attr('y', 13)
                .attr('font-size', '8px').attr('font-weight', '600').attr('fill', COLORS.muted)
                .text(`${st.station_id} · ${st.distance_km.toFixed(1)} km`);
            cell.append('text')
                .attr('x', w - 4).attr('y', h - 4)
                .attr('text-anchor', 'end')
                .attr('font-size', '9px').attr('font-weight', '700').attr('fill', COLORS.vel)
                .text(`${st.pgv_mms.toFixed(1)} mm/s`);

            // Staggered fade-in
            cell.transition()
                .delay(otherDelay + idx * 50)
                .duration(400)
                .attr('opacity', 1);
        });
    });
}

// ── Bin assignment helper ────────────────────────────────────────────────────
const BIN_EDGES = [[0,5],[5,10],[10,20],[20,30],[30,50]];
function getBinIndex(dist) {
    for (let i = 0; i < BIN_EDGES.length; i++) {
        if (dist >= BIN_EDGES[i][0] && dist < BIN_EDGES[i][1]) return i;
    }
    return -1;
}

// ── Shared: Box plot log y-scale ────────────────────────────────────────────
const BOX_Y_TICKS = [0.01, 0.02, 0.05, 0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 50];
const BOX_Y_MAJOR = [0.01, 0.1, 1, 10];

function boxLogY(countries) {
    const bp = DATA.boxPlots;
    const allVals = countries.flatMap(c =>
        bp.countries[c].bins.filter(Boolean).flatMap(b =>
            [b.whisker_lo, b.whisker_hi, ...b.outliers]));
    const yMin = Math.max(0.005, d3.min(allVals) * 0.7);
    const yMax = d3.max(allVals) * 1.3 || 50;
    return d3.scaleLog().base(10).domain([yMin, yMax]).range([iH, 0]);
}

function drawBoxYAxis(target, y) {
    const ticks = BOX_Y_TICKS.filter(t => t >= y.domain()[0] && t <= y.domain()[1]);
    const yAxis = target.append('g')
        .call(d3.axisLeft(y).tickValues(ticks).tickFormat(logTickFormat(BOX_Y_MAJOR)))
        .call(styleAxis);
    yAxis.selectAll('.tick text')
        .attr('font-weight', d => BOX_Y_MAJOR.includes(d) ? '700' : '400')
        .attr('font-size', d => BOX_Y_MAJOR.includes(d) ? '12px' : '10px');
    yAxis.selectAll('.tick line')
        .attr('x2', d => BOX_Y_MAJOR.includes(d) ? -8 : -5);

    // Grid
    ticks.forEach(d => {
        target.append('line')
            .attr('x1', 0).attr('x2', iW)
            .attr('y1', y(d)).attr('y2', y(d))
            .attr('stroke', BOX_Y_MAJOR.includes(d) ? '#D5D2CC' : '#ECEAE6')
            .attr('stroke-dasharray', BOX_Y_MAJOR.includes(d) ? 'none' : '2,3');
    });
}

// ── Shared: Log-log scales ──────────────────────────────────────────────────
function logLogScales() {
    const x = d3.scaleLog().base(10)
        .domain([0.8, 55])
        .range([0, iW]);
    const y = d3.scaleLog().base(10)
        .domain([0.01, 50])
        .range([iH, 0]);
    return { x, y };
}

// Log tick config: major ticks at powers of 10, minor at 2 & 5
const X_MAJOR = [1, 10];
const X_MINOR = [2, 5, 20, 50];
const X_TICKS = [...X_MAJOR, ...X_MINOR].sort((a, b) => a - b);
const Y_MAJOR = [0.01, 0.1, 1, 10];
const Y_MINOR = [0.02, 0.05, 0.2, 0.5, 2, 5, 20];
const Y_TICKS = [...Y_MAJOR, ...Y_MINOR].sort((a, b) => a - b);

function logTickFormat(major) {
    return d => {
        if (major.includes(d)) return d >= 1 ? d3.format('~g')(d) : d3.format('.2~g')(d);
        return d >= 1 ? d3.format('~g')(d) : d3.format('.1~g')(d);
    };
}

// ── Shared: Draw log-log axes (into any group) ─────────────────────────────
function drawLogAxes(target, x, y) {
    // X axis
    const xAxis = target.append('g').attr('transform', `translate(0,${iH})`)
        .call(d3.axisBottom(x).tickValues(X_TICKS).tickFormat(logTickFormat(X_MAJOR)))
        .call(styleAxis);
    // Bold major x ticks
    xAxis.selectAll('.tick text')
        .attr('font-weight', d => X_MAJOR.includes(d) ? '700' : '400')
        .attr('font-size', d => X_MAJOR.includes(d) ? '12px' : '10px');
    // Longer major tick lines
    xAxis.selectAll('.tick line')
        .attr('y2', d => X_MAJOR.includes(d) ? 8 : 5);

    // Y axis
    const yAxis = target.append('g')
        .call(d3.axisLeft(y).tickValues(Y_TICKS).tickFormat(logTickFormat(Y_MAJOR)))
        .call(styleAxis);
    yAxis.selectAll('.tick text')
        .attr('font-weight', d => Y_MAJOR.includes(d) ? '700' : '400')
        .attr('font-size', d => Y_MAJOR.includes(d) ? '12px' : '10px');
    yAxis.selectAll('.tick line')
        .attr('x2', d => Y_MAJOR.includes(d) ? -8 : -5);

    // Grid: solid for major, dashed for minor
    X_TICKS.forEach(d => {
        target.append('line')
            .attr('x1', x(d)).attr('x2', x(d))
            .attr('y1', 0).attr('y2', iH)
            .attr('stroke', X_MAJOR.includes(d) ? '#D5D2CC' : '#ECEAE6')
            .attr('stroke-dasharray', X_MAJOR.includes(d) ? 'none' : '2,3');
    });
    Y_TICKS.forEach(d => {
        target.append('line')
            .attr('x1', 0).attr('x2', iW)
            .attr('y1', y(d)).attr('y2', y(d))
            .attr('stroke', Y_MAJOR.includes(d) ? '#D5D2CC' : '#ECEAE6')
            .attr('stroke-dasharray', Y_MAJOR.includes(d) ? 'none' : '2,3');
    });
}

// ── Shared: Grid ────────────────────────────────────────────────────────────
function drawGrid(g, y, ticks) {
    g.selectAll('.grid').data(y.ticks(ticks)).join('line')
        .attr('x1', 0).attr('x2', iW)
        .attr('y1', d => y(d)).attr('y2', d => y(d))
        .attr('stroke', '#E3E0DB');
}

// ── Shared: Draw single box-plot column ─────────────────────────────────────
function drawBoxColumn(g, data, bins, x, y, color, delay) {
    bins.forEach((bin, bi) => {
        const b = data[bi];
        if (!b) return;

        const bx = x(bin);
        const bw = x.bandwidth();

        const boxG = g.append('g').attr('opacity', 0);

        // Whisker
        boxG.append('line')
            .attr('x1', bx + bw / 2).attr('x2', bx + bw / 2)
            .attr('y1', y(b.whisker_hi)).attr('y2', y(b.whisker_lo))
            .attr('stroke', color).attr('stroke-width', 1.5);

        // Box
        boxG.append('rect')
            .attr('x', bx).attr('width', bw)
            .attr('y', y(b.q3)).attr('height', y(b.q1) - y(b.q3))
            .attr('fill', color).attr('fill-opacity', 0.2)
            .attr('stroke', color).attr('stroke-width', 2);

        // Median
        boxG.append('line')
            .attr('x1', bx).attr('x2', bx + bw)
            .attr('y1', y(b.median)).attr('y2', y(b.median))
            .attr('stroke', color).attr('stroke-width', 3);

        // Whisker caps
        const capW = bw * 0.5;
        [b.whisker_lo, b.whisker_hi].forEach(val => {
            boxG.append('line')
                .attr('x1', bx + bw / 2 - capW / 2)
                .attr('x2', bx + bw / 2 + capW / 2)
                .attr('y1', y(val)).attr('y2', y(val))
                .attr('stroke', color).attr('stroke-width', 1.5);
        });

        boxG.transition()
            .delay(delay + bi * 100)
            .duration(400)
            .attr('opacity', 1);
    });
}

// ── Shared: Axis styling ────────────────────────────────────────────────────
function styleAxis(g) {
    g.selectAll('text')
        .attr('font-family', 'var(--font)')
        .attr('font-size', '11px')
        .attr('font-weight', '500')
        .attr('fill', '#6B6B6B');
    g.selectAll('line, path')
        .attr('stroke', '#C4C0BA');
}

// ── Shared: Axis labels ─────────────────────────────────────────────────────
function axisLabel(g, xLabel, yLabel) {
    g.append('text')
        .attr('x', iW / 2).attr('y', iH + 40)
        .attr('text-anchor', 'middle')
        .attr('font-size', '12px').attr('fill', '#5A5A5A')
        .attr('font-family', 'var(--font)')
        .text(xLabel);
    g.append('text')
        .attr('transform', 'rotate(-90)')
        .attr('x', -iH / 2).attr('y', -45)
        .attr('text-anchor', 'middle')
        .attr('font-size', '12px').attr('fill', '#5A5A5A')
        .attr('font-family', 'var(--font)')
        .text(yLabel);
}

// ── Legend ───────────────────────────────────────────────────────────────────
function showLegend(container, items) {
    const el = container.querySelector('.chart-legend');
    if (!el) return;
    el.innerHTML = items.map(it =>
        `<span><span class="swatch" style="background:${it.color}"></span>${it.label}</span>`
    ).join('');
}
</script>
