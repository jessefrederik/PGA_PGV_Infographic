<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van sensor tot PGV — Groningse aardbevingen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-acc: #C44D3F;
            --color-vel: #2D5F7C;
            --color-dc-accent: #C04040;
            --color-bg: #FAFAF8;
            --color-surface: #F0EDE8;
            --color-text: #2D2D2D;
            --color-muted: #6B6B6B;
            --color-caption: #707070;
            --color-border: #E3E0DB;
            --font: 'Libre Franklin', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'PT Serif', Georgia, serif;
        }

        body {
            font-family: var(--font);
            color: var(--color-text);
            background: var(--color-bg);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Title section ───────────────────────────────────────────────── */
        .title-section {
            max-width: 640px;
            margin: 0 auto;
            padding: 4rem 1.5rem 2rem;
            text-align: center;
        }
        .title-section h1 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            line-height: 1.25;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        .title-section h1::before {
            content: '';
            display: block;
            width: 48px;
            height: 4px;
            background: var(--color-dc-accent);
            margin: 0 auto 1rem;
            border-radius: 2px;
        }
        .title-section .subtitle {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.05rem;
            color: var(--color-muted);
            margin-bottom: 1.5rem;
        }

        /* ── Scroll reveal ───────────────────────────────────────────────── */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.5s ease; /* exit: just fade, no slide */
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.7s ease, transform 0.7s ease; /* enter: fade + slide */
        }

        /* ── Article prose ───────────────────────────────────────────────── */
        .article-prose {
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .article-prose p {
            font-family: var(--font-display);
            font-size: 1.05rem;
            line-height: 1.85;
            color: var(--color-text);
            margin-bottom: 1.25rem;
        }
        .article-prose p:last-child { margin-bottom: 0; }
        .article-prose strong { font-weight: 700; }
        .article-prose em { font-style: italic; }

        /* ── Accelerometer diagram ─────────────────────────────────────── */
        .accel-diagram {
            max-width: min(95vw, 900px);
            margin: 2rem auto 2.5rem;
            padding: 0 1rem;
        }
        .accel-diagram svg { display: block; width: 100%; height: auto; }

        /* Animation cycle: 3s rest → 4s quake → 3s rest (10s total) */
        .accel-housing {
            animation: accel-shake 10s ease-in-out infinite;
        }
        .accel-mass {
            animation: accel-mass-lag 10s ease-in-out infinite;
        }
        .accel-spring polyline {
            animation: accel-spring-flex 10s ease-in-out infinite;
        }
        .accel-wire {
            animation: accel-wire-move 10s ease-in-out infinite;
        }

        /* State text: crossfade */
        .accel-state-rest { animation: accel-show-rest 10s ease-in-out infinite; }
        .accel-state-quake { animation: accel-show-quake 10s ease-in-out infinite; }
        .accel-arrows { animation: accel-show-quake 10s ease-in-out infinite; }

        /* Signal trace: draws during quake */
        .accel-signal-line {
            animation: accel-draw-signal 10s linear infinite;
        }

        @keyframes accel-shake {
            0%, 28% { transform: translateX(0); }
            32% { transform: translateX(12px); }
            36% { transform: translateX(-14px); }
            39% { transform: translateX(10px); }
            42% { transform: translateX(-11px); }
            45% { transform: translateX(8px); }
            48% { transform: translateX(-7px); }
            51% { transform: translateX(5px); }
            54% { transform: translateX(-4px); }
            57% { transform: translateX(2px); }
            60% { transform: translateX(-1px); }
            65%, 100% { transform: translateX(0); }
        }

        @keyframes accel-mass-lag {
            0%, 28% { transform: translateX(0); }
            34% { transform: translateX(-6px); }
            38% { transform: translateX(8px); }
            41% { transform: translateX(-5px); }
            44% { transform: translateX(6px); }
            47% { transform: translateX(-4px); }
            50% { transform: translateX(3px); }
            53% { transform: translateX(-2px); }
            56% { transform: translateX(1.5px); }
            59% { transform: translateX(-0.5px); }
            65%, 100% { transform: translateX(0); }
        }

        @keyframes accel-spring-flex {
            0%, 28% { transform: scaleX(1); }
            32% { transform: scaleX(1.12); }
            36% { transform: scaleX(0.85); }
            39% { transform: scaleX(1.08); }
            42% { transform: scaleX(0.9); }
            45% { transform: scaleX(1.05); }
            48% { transform: scaleX(0.93); }
            51% { transform: scaleX(1.03); }
            54% { transform: scaleX(0.96); }
            57% { transform: scaleX(1.01); }
            65%, 100% { transform: scaleX(1); }
        }

        @keyframes accel-wire-move {
            0%, 28% { transform: translateX(0); }
            34% { transform: translateX(-6px); }
            38% { transform: translateX(8px); }
            41% { transform: translateX(-5px); }
            44% { transform: translateX(6px); }
            47% { transform: translateX(-4px); }
            50% { transform: translateX(3px); }
            53% { transform: translateX(-2px); }
            56% { transform: translateX(1.5px); }
            65%, 100% { transform: translateX(0); }
        }

        @keyframes accel-show-rest {
            0%, 25% { opacity: 1; }
            30%, 65% { opacity: 0; }
            70%, 100% { opacity: 1; }
        }
        @keyframes accel-show-quake {
            0%, 25% { opacity: 0; }
            32%, 62% { opacity: 1; }
            68%, 100% { opacity: 0; }
        }

        @keyframes accel-draw-signal {
            0%, 28% { d: path("M0,32 Q15,32 30,32 T60,32"); }
            35% { d: path("M0,32 Q15,32 30,32 T60,32 Q80,4 100,32 Q120,60 140,32"); }
            42% { d: path("M0,32 Q15,32 30,32 T60,32 Q80,4 100,32 Q120,60 140,32 Q155,8 170,32 Q185,54 200,32"); }
            50% { d: path("M0,32 Q15,32 30,32 T60,32 Q80,4 100,32 Q120,60 140,32 Q155,8 170,32 Q185,54 200,32 Q212,12 224,32 Q236,48 248,32"); }
            58% { d: path("M0,32 Q15,32 30,32 T60,32 Q80,4 100,32 Q120,60 140,32 Q155,8 170,32 Q185,54 200,32 Q212,12 224,32 Q236,48 248,32 Q258,18 268,32 Q278,42 288,32 Q296,26 304,32 T330,32"); }
            66%, 100% { d: path("M0,32 Q15,32 30,32 T60,32 Q80,4 100,32 Q120,60 140,32 Q155,8 170,32 Q185,54 200,32 Q212,12 224,32 Q236,48 248,32 Q258,18 268,32 Q278,42 288,32 Q296,26 304,32 T330,32 Q345,32 370,32"); }
        }

        /* ── Inline charts ──────────────────────────────────────────────── */
        .inline-chart {
            max-width: min(95vw, 1100px);
            margin: 2rem auto 3rem;
            padding: 0 1rem;
            position: relative;
        }
        .inline-chart svg {
            display: block;
            width: 100%;
            height: auto;
        }
        .inline-chart .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(30, 30, 30, 0.92);
            color: #fff;
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            line-height: 1.5;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 20;
        }
        .inline-chart .chart-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-muted);
            margin-top: 0.5rem;
        }
        .inline-chart .chart-legend .swatch {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* ── Scrollytelling (sticky chart + scrolling text) ─────────────── */
        .scrolly {
            display: flex;
            align-items: flex-start;
            max-width: 1400px;
            margin: 3rem auto 0;
            border-top: 1px solid var(--color-border);
            padding-top: 1rem;
        }
        .scrolly-steps {
            flex: 0 0 36%;
            padding: 0 1.5rem 0 2rem;
            z-index: 2;
        }
        .step {
            min-height: 85vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }
        .step:last-child { min-height: 60vh; }
        .step-text {
            background: rgba(250, 250, 248, 0.95);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 8px;
            padding: 1.5rem 1.75rem;
            border: 1px solid var(--color-border);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            opacity: 0.25;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .step.active .step-text {
            opacity: 1;
            transform: translateY(0);
        }
        .step-text p {
            font-family: var(--font-display);
            font-size: 1rem;
            line-height: 1.85;
            color: var(--color-text);
            margin-bottom: 1rem;
        }
        .step-text p:last-child { margin-bottom: 0; }
        .step-text strong { font-weight: 700; }
        .step-text em { font-style: italic; }

        .scrolly-chart {
            flex: 1;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem 2rem 0.5rem;
        }
        .scrolly-chart svg {
            display: block;
            width: 100%;
            height: auto;
        }
        .scrolly-chart .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(30, 30, 30, 0.92);
            color: #fff;
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            line-height: 1.5;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 20;
        }
        .scrolly-chart .chart-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-muted);
            margin-top: 0.5rem;
        }
        .scrolly-chart .chart-legend .swatch {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* ── Map ────────────────────────────────────────────────────────── */
        #scrolly-map {
            position: absolute;
            inset: 0;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #scrolly-map.active {
            opacity: 1;
            pointer-events: auto;
        }
        #scrolly-map .leaflet-control-attribution { font-size: 9px; }
        .map-epicenter-label {
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            color: var(--color-dc-accent);
            white-space: nowrap;
            text-shadow: 1px 1px 3px #fff, -1px -1px 3px #fff, 0 0 6px #fff;
        }
        .map-station-label {
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            text-shadow: 1px 1px 2px #fff, -1px -1px 2px #fff, 0 0 4px #fff;
        }

        /* ── Footer ──────────────────────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            font-size: 0.75rem;
            color: var(--color-caption);
            border-top: 1px solid var(--color-border);
            max-width: 640px;
            margin: 0 auto;
        }
        footer a { color: var(--color-vel); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Loading state ───────────────────────────────────────────────── */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--color-muted);
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-vel);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ──────────────────────────────────────────────────── */
        @media (max-width: 840px) {
            .article-prose { padding: 0 1.2rem 1.5rem; }
            .article-prose p { font-size: 0.95rem; }
            .inline-chart { padding: 0 0.5rem; }
            .scrolly { flex-direction: column; margin-top: 2rem; }
            .scrolly-chart {
                order: -1;
                height: 50vh;
                position: sticky;
                top: 0;
                flex: none;
                width: 100%;
                padding: 1rem;
                border-bottom: 1px solid var(--color-border);
                background: var(--color-bg);
            }
            .scrolly-steps {
                flex: none;
                width: 100%;
                padding: 1rem 1.2rem;
            }
            .step { min-height: 55vh; }
        }
        /* ── Sneeuwhoen easter egg ─────────────────────────────────────── */
        .hoen-container {
            position: fixed;
            bottom: 40px;
            left: -120px;
            width: 100px;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
        }
        /* March position is now scroll-driven (set via JS) */
        /* Legs: short crouched steps, small rotation (ptarmigan have short legs) */
        .hoen-poot-links {
            transform-origin: 40px 55px;
            animation: hoen-stap 0.35s ease-in-out infinite;
        }
        .hoen-poot-rechts {
            transform-origin: 52px 55px;
            animation: hoen-stap 0.35s ease-in-out infinite 0.175s;
        }
        @keyframes hoen-stap {
            0%, 100% { transform: rotate(0deg); }
            50%      { transform: rotate(-15deg); }
        }
        /* Body: very subtle bob — ptarmigan are compact and low */
        .hoen-body { animation: hoen-bob 0.35s ease-in-out infinite; }
        @keyframes hoen-bob {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-1.5px); }
        }
        /* Head bob: thrust-and-hold (galliform style) — fast forward, slow hold */
        .hoen-kop {
            animation: hoen-headbob 0.35s ease-out infinite;
        }
        @keyframes hoen-headbob {
            0%   { transform: translateX(0); }
            25%  { transform: translateX(2.5px); }  /* quick thrust forward */
            100% { transform: translateX(0); }       /* slow hold/retract as body catches up */
        }
        /* Tail: slight droop, minimal movement */
        .hoen-staart { transform-origin: 22px 42px; animation: hoen-wag 0.8s ease-in-out infinite; }
        @keyframes hoen-wag {
            0%, 100% { transform: rotate(0deg); }
            50%      { transform: rotate(2deg); }
        }
        /* Freeze-stop: pause all walk animations (ptarmigan freeze mid-walk!) */
        .hoen-freeze .hoen-body,
        .hoen-freeze .hoen-kop,
        .hoen-freeze .hoen-poot-links,
        .hoen-freeze .hoen-poot-rechts,
        .hoen-freeze .hoen-staart {
            animation-play-state: paused;
        }
        /* Sniff animation: head dips down to investigate (infinite while class active) */
        .hoen-sniff .hoen-kop {
            animation: hoen-sniff-bob 0.3s ease-in-out infinite !important;
            animation-play-state: running !important;
            transform-origin: 64px 38px;
        }
        @keyframes hoen-sniff-bob {
            0%, 100% { transform: rotate(0deg); }
            50%      { transform: rotate(-20deg); } /* look UP toward waveform */
        }
        /* Big cartoonish AWEBO! yell bubble */
        .hoen-awebo {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            width: 260px;
            bottom: 130px;
            left: 50vw;
            opacity: 0;
            transform: scale(0) rotate(-5deg);
            transform-origin: 15% 100%;
            transition: opacity 0.12s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hoen-awebo.active {
            opacity: 1;
            transform: scale(1) rotate(-3deg);
        }
        /* ── Attack finale ────────────────────────────────────────────── */
        /* Return walk: flipped, from right to center */
        .hoen-container.hoen-return {
            animation: hoen-return 3s linear forwards;
            opacity: 1;
            transform: scaleX(-1);
        }
        @keyframes hoen-return {
            0%   { left: calc(100vw + 120px); }
            100% { left: calc(50vw - 50px); }
        }
        /* Front-facing attack view */
        .hoen-face-container {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 150px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
        }
        .hoen-face-container.hoen-zoom {
            opacity: 1;
            transform: translate(-50%, -50%) scale(8);
        }
        .hoen-face-container.hoen-lunge {
            transform: translate(-50%, -50%) scale(14);
        }
        /* Screen shake on attack */
        .hoen-shake {
            animation: hoen-screen-shake 0.4s ease-out;
        }
        @keyframes hoen-screen-shake {
            0%, 100% { transform: translate(0, 0); }
            10%  { transform: translate(-8px, 4px); }
            30%  { transform: translate(6px, -6px); }
            50%  { transform: translate(-4px, 3px); }
            70%  { transform: translate(5px, -2px); }
            90%  { transform: translate(-2px, 1px); }
        }
        /* Black flash overlay */
        .hoen-blackout {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .hoen-blackout.active { opacity: 1; }
    </style>
</head>
<body>

<div class="title-section">
    <h1 id="page-title">Van sensor tot piekgrondsnelheid</h1>
    <p class="subtitle" id="page-subtitle">
        Hoe komen seismologen van een rauw signaal uit de grond tot het getal dat
        vertelt hoeveel schade een aardbeving kan veroorzaken?
    </p>
</div>

<div class="article-prose reveal" id="prose-intro"></div>

<div class="accel-diagram reveal">
    <svg viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="ground-hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="6" stroke="#C4BFB6" stroke-width="1"/>
            </pattern>
            <linearGradient id="housing-fill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#E8E4DE"/>
                <stop offset="100%" stop-color="#D8D3CB"/>
            </linearGradient>
            <linearGradient id="mass-fill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#6B6B6B"/>
                <stop offset="100%" stop-color="#4A4A4A"/>
            </linearGradient>
        </defs>

        <!-- Ground layer (full width) -->
        <g class="accel-ground">
            <rect x="0" y="210" width="860" height="70" fill="url(#ground-hatch)" opacity="0.5"/>
            <line x1="0" y1="210" x2="860" y2="210" stroke="#B8B4AE" stroke-width="1.5"/>
        </g>

        <!-- Whole sensor unit (moves with ground) — centered left -->
        <g class="accel-housing">
            <!-- Housing box -->
            <rect x="80" y="80" width="250" height="130" rx="8"
                fill="url(#housing-fill)" stroke="#A8A29E" stroke-width="2"/>
            <!-- Housing interior -->
            <rect x="96" y="96" width="218" height="98" rx="4"
                fill="#FAFAF8" stroke="#D0CDC7" stroke-width="1.2"/>

            <!-- Spring: zigzag from left wall to mass -->
            <g class="accel-spring">
                <polyline points="96,145 110,122 124,168 138,122 152,168 166,122 180,145"
                    fill="none" stroke="#A8A29E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </g>

            <!-- Mass (moves independently, lags behind) -->
            <g class="accel-mass">
                <rect x="180" y="118" width="56" height="56" rx="4"
                    fill="url(#mass-fill)" stroke="#3D3D3D" stroke-width="1.2"/>
            </g>

            <!-- Wire / sensor indicator -->
            <line x1="236" y1="145" x2="314" y2="145"
                stroke="#C44D3F" stroke-width="2" stroke-dasharray="4,3" class="accel-wire"/>
            <circle cx="314" cy="145" r="4" fill="#C44D3F" opacity="0.8"/>

            <!-- Label: behuizing -->
            <text x="205" y="72" text-anchor="middle"
                font-family="'Libre Franklin', sans-serif" font-size="12" font-weight="600" fill="#6B6B6B">behuizing</text>
            <!-- Label: gewicht -->
            <text x="208" y="190" text-anchor="middle"
                font-family="'Libre Franklin', sans-serif" font-size="11" fill="#6B6B6B">gewicht</text>
            <!-- Label: veer -->
            <text x="138" y="112" text-anchor="middle"
                font-family="'Libre Franklin', sans-serif" font-size="11" fill="#6B6B6B">veer</text>
        </g>

        <!-- Right side: labels + signal -->
        <g class="accel-labels" font-family="'Libre Franklin', sans-serif">
            <!-- State 1: Rest -->
            <g class="accel-state-rest">
                <text x="430" y="105" font-size="16" font-weight="700" fill="#2D2D2D">In rust</text>
                <text x="430" y="130" font-size="13" fill="#6B6B6B">Kastje en gewicht staan stil.</text>

<script>
// ── Load tekst.md ───────────────────────────────────────────────────────────
fetch('tekst.md?v=' + Date.now())
    .then(r => r.text())
    .then(md => {
        // Parse title + subtitle from h1 and first paragraph
        const titleMatch = md.match(/^# (.+)$/m);
        const subtitleMatch = md.match(/^# .+\n\n(.+)\n\n---/s);
        if (titleMatch) document.getElementById('page-title').textContent = titleMatch[1];
        if (subtitleMatch) document.getElementById('page-subtitle').textContent = subtitleMatch[1];

        // Parse sections: split on ## headings
        const sections = md.split(/^## /m).slice(1);
        sections.forEach(sec => {
            const lines = sec.trim().split('\n');
            const id = lines[0].trim();
            const body = lines.slice(1).join('\n').trim();
            const el = document.getElementById('prose-' + id);
            if (!el) return;
            // Convert markdown paragraphs to HTML
            el.innerHTML = body
                .split(/\n\n+/)
                .map(p => {
                    let html = p.trim()
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.+?)\*/g, '<em>$1</em>');
                    return '<p>' + html + '</p>';
                })
                .join('\n');
        });
    });

// ── Scroll reveal ───────────────────────────────────────────────────────────
const revealObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            // Prose: reveal once and stay
            if (!entry.target.classList.contains('inline-chart')) {
                revealObserver.unobserve(entry.target);
            }
        } else if (entry.target.classList.contains('inline-chart')) {
            // Charts: fade out when scrolled away
            entry.target.classList.remove('visible');
        }
    });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

// ── Config ──────────────────────────────────────────────────────────────────
const COLORS = {
    nl: '#2D5F7C', it: '#C04040', ca: '#A07A2A', jp: '#6B9080',
    vel: '#2D5F7C', acc: '#C44D3F', muted: '#B8B4AE',
};
const COUNTRY_META = {
    Netherlands: { color: COLORS.nl, label: 'Nederland' },
    Japan:       { color: COLORS.jp, label: 'Japan' },
    Italy:       { color: COLORS.it, label: 'Italië' },
    California:  { color: COLORS.ca, label: 'Californië' },
};
const EVENT_COLORS = ['#2D5F7C', '#8E7B98', '#A07A2A'];

const M = { top: 40, right: 30, bottom: 50, left: 60 };
const VB_W = 800, VB_H = 480;

// ── State ───────────────────────────────────────────────────────────────────
let DATA, iW, iH;
let activeTip = null, activeChartEl = null;

// ── Load ────────────────────────────────────────────────────────────────────
Promise.all([
    d3.json('data/scroll_data.json?v=2'),
    d3.json('data/mini_waveforms.json?v=2'),
    d3.json('data/all_stations.json?v=2'),
]).then(([scrollData, miniWaves, allStations]) => {
    DATA = scrollData;
    DATA.miniWaveforms = miniWaves;
    DATA.allStations = allStations;
    drawInlineWaveforms(scrollData.waveform);
    initAllCharts();
    initScrolly();
}).catch(err => {
    console.error('Data laden mislukt:', err);
});

// ── Inline chart setup ──────────────────────────────────────────────────────
function setupChart(containerId, vbH) {
    const h = vbH || VB_H;
    const container = document.getElementById(containerId);
    activeTip = container.querySelector('.tooltip');
    activeChartEl = container;

    iW = VB_W - M.left - M.right;
    iH = h - M.top - M.bottom;

    const svgEl = d3.select(container).select('svg')
        .attr('viewBox', `0 0 ${VB_W} ${h}`);
    svgEl.selectAll('*').remove();

    return svgEl.append('g')
        .attr('transform', `translate(${M.left},${M.top})`);
}

function initAllCharts() {
    const charts = [];

    // Draw each chart when its reveal animation triggers
    charts.forEach(({ id, draw, vbH }) => {
        const container = document.getElementById(id);
        const obs = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) {
                // Small delay so the fade-in is visible before content draws
                setTimeout(() => {
                    const g = setupChart(id, vbH);
                    draw(g);
                }, 200);
                obs.disconnect();
            }
        }, { threshold: 0.15 });
        obs.observe(container);
    });
}

// ── Scrollytelling state machine ────────────────────────────────────────────
function initScrolly() {
    const chartContainer = document.getElementById('scrolly-chart');
    const steps = document.querySelectorAll('.scrolly .step');
    let currentStep = null;
    let hoenShown = false;

    const STEPS = ['vel-waveform', 'pgv-punt', 'kaart', 'sparklines', 'scatter', 'drie-bevingen', 'boxplots', 'internationaal'];

    // Ensure dimensions are set
    iW = VB_W - M.left - M.right;
    iH = VB_H - M.top - M.bottom;

    const svgEl = d3.select(chartContainer).select('svg')
        .attr('viewBox', `0 0 ${VB_W} ${VB_H}`);

    // Shared scales: scatter ↔ boxplot continuity (same y-domain)
    const sharedY = d3.scaleLog().base(10).domain([0.01, 50]).range([iH, 0]);
    const scatX = d3.scaleLog().base(10).domain([0.8, 55]).range([0, iW]);
    const boxX = d3.scaleBand().domain(BIN_LABELS).range([0, iW]).padding(0.35);

    function stepIdx(name) { return STEPS.indexOf(name); }

    function setGlobalCtx() {
        activeTip = chartContainer.querySelector('.tooltip');
        activeChartEl = chartContainer;
        iW = VB_W - M.left - M.right;
        iH = VB_H - M.top - M.bottom;
    }

    // ── Leaflet map ──────────────────────────────────────────────────
    const mapEl = document.getElementById('scrolly-map');
    let leafletMap = null;
    let mapMarkers = [];       // dynamic markers (cleared on re-show)
    let mapSelectedMarkers = []; // the 20 highlighted markers

    function initMap() {
        if (leafletMap) return;
        leafletMap = L.map(mapEl, {
            zoomControl: false,
            attributionControl: true,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
        }).setView([53.28, 6.72], 10);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
        }).addTo(leafletMap);

        // Epicenter marker (concentric circles + crosshair)
        const epicenter = [53.3633, 6.7862];
        const epiIcon = L.divIcon({
            className: '',
            html: `<svg width="48" height="48" viewBox="-24 -24 48 48">
                <circle r="18" fill="none" stroke="${COLORS.acc}" stroke-width="1.5" opacity="0.3"/>
                <circle r="12" fill="none" stroke="${COLORS.acc}" stroke-width="1.5" opacity="0.5"/>
                <circle r="6" fill="none" stroke="${COLORS.acc}" stroke-width="2" opacity="0.7"/>
                <circle r="2.5" fill="${COLORS.acc}" opacity="0.9"/>
                <line x1="-22" x2="22" y1="0" y2="0" stroke="${COLORS.acc}" stroke-width="0.8" opacity="0.35"/>
                <line x1="0" x2="0" y1="-22" y2="22" stroke="${COLORS.acc}" stroke-width="0.8" opacity="0.35"/>
            </svg>`,
            iconSize: [48, 48],
            iconAnchor: [24, 24],
        });
        L.marker(epicenter, { icon: epiIcon, interactive: false, zIndexOffset: 1000 }).addTo(leafletMap);
        L.marker(epicenter, {
            icon: L.divIcon({
                className: 'map-epicenter-label',
                html: 'Epicentrum Zeerijp',
                iconAnchor: [-28, 5],
            }),
            interactive: false,
            zIndexOffset: 1000,
        }).addTo(leafletMap);
    }

    function showMap(animate) {
        mapEl.classList.add('active');
        svgEl.style('opacity', 0).style('pointer-events', 'none');
        svgEl.selectAll('.scrolly-group').remove();

        initMap();
        leafletMap.invalidateSize();

        // Clear dynamic markers
        mapMarkers.forEach(m => leafletMap.removeLayer(m));
        mapMarkers = [];
        mapSelectedMarkers = [];

        const selectedIds = new Set(DATA.miniWaveforms.map(s => s.station_id));
        const baseDelay = animate ? 100 : 0;

        // 1. All stations as small dark dots (using divIcon for reliable rendering)
        const dotIcon = L.divIcon({
            className: '',
            html: '<div style="width:8px;height:8px;border-radius:50%;background:#2D2D2D;opacity:0.6;border:1px solid #fff;"></div>',
            iconSize: [8, 8],
            iconAnchor: [4, 4],
        });

        setTimeout(() => {
            (DATA.allStations || []).forEach(st => {
                if (selectedIds.has(st.id)) return;
                const m = L.marker([st.lat, st.lon], {
                    icon: dotIcon,
                    interactive: true,
                }).addTo(leafletMap);
                m.bindTooltip(`<b>${st.id}</b>`, { direction: 'top', offset: [0, -6] });
                mapMarkers.push(m);
            });

            // 2. The 20 selected stations: larger, colored, staggered after black dots
            const selected = [...DATA.miniWaveforms].sort((a, b) => a.distance_km - b.distance_km);
            selected.forEach((st, i) => {
                if (!st.lat || !st.lon) return;
                const delay = animate ? i * 60 + 300 : 0;
                setTimeout(() => {
                    const selIcon = L.divIcon({
                        className: '',
                        html: `<div style="width:16px;height:16px;border-radius:50%;background:${COLORS.vel};opacity:0.9;border:2.5px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.3);"></div>`,
                        iconSize: [16, 16],
                        iconAnchor: [8, 8],
                    });
                    const m = L.marker([st.lat, st.lon], {
                        icon: selIcon,
                        zIndexOffset: 500,
                    }).addTo(leafletMap);
                    m.bindTooltip(
                        `<b>${st.station_id}</b><br>${st.distance_km.toFixed(1)} km · ${st.pgv_mms.toFixed(1)} mm/s`,
                        { direction: 'top', offset: [0, -10] }
                    );
                    m._stationData = st;
                    mapMarkers.push(m);
                    mapSelectedMarkers.push(m);
                }, delay);
            });
        }, baseDelay);

        setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 550);
    }

    function hideMap() {
        mapEl.classList.remove('active');
        svgEl.style('opacity', null).style('pointer-events', null);
    }

    // ── Map → Sparklines transition ──────────────────────────────────
    function fwdMapToSparklines() {
        // Fade out map, then draw sparklines with waveform draw animation
        hideMap();

        const g = svgEl.append('g')
            .attr('class', 'scrolly-group')
            .attr('transform', `translate(${M.left},${M.top})`)
            .attr('opacity', 0);

        const stations = [...DATA.miniWaveforms].sort((a, b) => a.distance_km - b.distance_km);
        const cols = 5, rows = 4, headerH = 22;
        const cellW = iW / cols, cellH = (iH - headerH) / rows;
        const pad = 4, cw = cellW - pad * 2, ch = cellH - pad * 2;
        const globalMaxAbs = d3.max(stations, st =>
            d3.max(st.velocity, d => Math.abs(d))) || 1;
        const binned = [[], [], [], [], []];
        stations.forEach(st => binned[st.bin_index].push(st));

        buildSparklineCells(g, stations, binned, cols, rows, headerH,
            cellW, cellH, pad, cw, ch, globalMaxAbs, 'reveal');

        g.transition().delay(300).duration(500).attr('opacity', 1);
    }

    function activateStep(stepName) {
        if (stepName === currentStep) return;
        const fromIdx = currentStep ? stepIdx(currentStep) : -1;
        const toIdx = stepIdx(stepName);
        const prevStep = currentStep;
        currentStep = stepName;

        setGlobalCtx();
        const legend = chartContainer.querySelector('.chart-legend');
        if (legend) legend.innerHTML = '';

        // Map visibility
        if (stepName === 'kaart') {
            showMap(fromIdx >= 0 && toIdx === fromIdx + 1);
            steps.forEach(s => s.classList.remove('active'));
            document.querySelector(`.step[data-step="${stepName}"]`)?.classList.add('active');
            return;
        }

        // Defer hideMap for kaart→sparklines so fwdMapToSparklines can read marker positions
        const comingFromMap = prevStep === 'kaart';
        if (!comingFromMap) hideMap();

        // Forward single-step → animated transition
        if (fromIdx >= 0 && toIdx === fromIdx + 1) {
            forwardTransition(prevStep, stepName);
        } else {
            if (comingFromMap) hideMap();
            crossfadeRedraw(stepName);
        }

        steps.forEach(s => s.classList.remove('active'));
        document.querySelector(`.step[data-step="${stepName}"]`)?.classList.add('active');

        // 🐦 Sneeuwhoen easter egg — eenmalig bij sparklines-stap (waveforms visible)
        if (stepName === 'sparklines' && !hoenShown) {
            hoenShown = true;
            startHoenSequence();
        }
    }

    // ── 🐦 Sneeuwhoen: scroll-driven march → sniff waveform → AWEBO! → attack ──
    function startHoenSequence() {
        const hoen = document.getElementById('sneeuwhoen');
        const awebo = document.getElementById('hoen-awebo');
        const face = document.getElementById('hoen-face');
        const blackout = document.getElementById('hoen-blackout');

        const sparkStep = document.querySelector('.step[data-step="sparklines"]');
        const endStep = document.querySelector('.step[data-step="boxplots"]');
        // Scroll distance from sparklines to boxplots (3 steps, ~255vh)
        const scrollRange = endStep.getBoundingClientRect().top - sparkStep.getBoundingClientRect().top;
        const triggerY = window.innerHeight * 0.55;

        // Calculate where the 2nd sparkline column is on screen
        // SVG viewBox 800×480, M.left=60, cellW=142 → col 1 center = 60 + 142 + 71 = 273
        const chartSvg = document.querySelector('.scrolly-chart svg');
        const svgRect = chartSvg.getBoundingClientRect();
        const scale = svgRect.width / 800;
        const waveformX = svgRect.left + 273 * scale;   // viewport x of 2nd column center
        const sniffLeft = waveformX - 68;                // bird left so head (x=68) aligns

        let attackStarted = false;
        let ticking = false;

        function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

        function update() {
            ticking = false;
            if (attackStarted) return;

            const p = (triggerY - sparkStep.getBoundingClientRect().top) / scrollRange;
            const vw = window.innerWidth / 100;
            const freeze1X = 22 * vw;

            // Hide if before range
            if (p < -0.02) { hoen.style.opacity = '0'; return; }
            hoen.style.opacity = '1';

            // States based on scroll progress
            const inFreeze1 = p >= 0.12 && p < 0.16;
            const inSniff   = p >= 0.38 && p < 0.48;
            const inAwebo   = p >= 0.48 && p < 0.58;
            const frozen    = inFreeze1 || inSniff || inAwebo;

            hoen.classList.toggle('hoen-freeze', frozen);
            hoen.classList.toggle('hoen-sniff', inSniff);
            awebo.classList.toggle('active', inAwebo);

            // Horizontal position — walk to the waveform, stop, then walk off
            let leftPx;
            if (p < 0.12) {
                leftPx = lerp(-120, freeze1X, Math.max(0, p) / 0.12);
            } else if (p < 0.16) {
                leftPx = freeze1X;               // freeze #1
            } else if (p < 0.38) {
                leftPx = lerp(freeze1X, sniffLeft, (p - 0.16) / 0.22);  // walk to waveform
            } else if (p < 0.58) {
                leftPx = sniffLeft;              // stopped at waveform (sniff + AWEBO)
            } else if (p <= 1.0) {
                leftPx = lerp(sniffLeft, window.innerWidth + 120, (p - 0.58) / 0.42);
            } else {
                leftPx = window.innerWidth + 120;
                attackStarted = true;
                window.removeEventListener('scroll', onScroll);
                startAttackFinale(hoen, face, awebo, blackout);
            }

            hoen.style.left = leftPx + 'px';

            // Position AWEBO bubble above bird's head
            if (inAwebo) {
                awebo.style.left = Math.min(leftPx + 80, window.innerWidth - 280) + 'px';
            }
        }

        function onScroll() {
            if (!ticking) { requestAnimationFrame(update); ticking = true; }
        }

        window.addEventListener('scroll', onScroll, { passive: true });
        update();
    }

    // ── Attack finale (timer-based cinematic sequence) ──
    function startAttackFinale(hoen, face, awebo, blackout) {
        // Reset inline left so CSS animation can take over
        hoen.style.removeProperty('left');
        hoen.classList.remove('hoen-freeze');
        hoen.classList.remove('hoen-sniff');
        awebo.classList.remove('active');

        // Return walk: flipped, right → center
        void hoen.offsetWidth;
        hoen.classList.add('hoen-return');

        // Freeze at center + AWEBO!
        setTimeout(() => {
            hoen.classList.add('hoen-freeze');
            awebo.style.left = 'calc(50vw + 60px)';
            awebo.classList.add('active');
        }, 3000);

        // Face camera — hide side view + bubble, show front view
        setTimeout(() => {
            awebo.classList.remove('active');
            hoen.style.opacity = '0';
            face.classList.add('hoen-zoom');
        }, 4000);

        // ATTACK! — lunge + screen shake
        setTimeout(() => {
            face.classList.remove('hoen-zoom');
            face.classList.add('hoen-lunge');
            document.body.classList.add('hoen-shake');
        }, 5000);

        // Blackout flash
        setTimeout(() => { blackout.classList.add('active'); }, 5500);

        // Clean up
        setTimeout(() => {
            blackout.classList.remove('active');
            face.classList.remove('hoen-lunge');
            face.style.opacity = '0';
            document.body.classList.remove('hoen-shake');
            hoen.style.display = 'none';
            face.style.display = 'none';
            awebo.style.display = 'none';
        }, 6500);
    }

    // ── Crossfade (backward or jump) ────────────────────────────────
    function crossfadeRedraw(stepName) {
        svgEl.selectAll('.scrolly-group')
            .transition().duration(250).attr('opacity', 0)
            .on('end', function() { d3.select(this).remove(); });

        const g = svgEl.append('g')
            .attr('class', 'scrolly-group')
            .attr('transform', `translate(${M.left},${M.top})`)
            .attr('opacity', 0);

        drawFullState(stepName, g);
        g.transition().delay(200).duration(400).attr('opacity', 1);
    }

    function drawFullState(stepName, g) {
        switch (stepName) {
            case 'vel-waveform':   drawVelWaveform(g, false); break;
            case 'pgv-punt':       drawVelWaveform(g, true); break;
            case 'sparklines':     drawSparklinesFull(g); break;
            case 'scatter':        drawScatterFull(g, false); break;
            case 'drie-bevingen':  drawScatterFull(g, true); break;
            case 'boxplots':       showBoxPlots(g); break;
            case 'internationaal': showInternational(g); break;
        }
    }

    // ── Velocity waveform state ─────────────────────────────────────
    function drawVelWaveform(g, withAnnotation) {
        const w = DATA.waveform;
        const data = w.velocity;
        const x = d3.scaleLinear().domain(d3.extent(w.times)).range([0, iW]);
        const yAbs = d3.max(data, d => Math.abs(d)) * 1.15;
        const y = d3.scaleLinear().domain([-yAbs, yAbs]).range([iH, 0]);

        // Axes + grid (all non-waveform visuals)
        const axesG = g.append('g').attr('class', 'axes-layer');
        axesG.selectAll('.grid-line').data(y.ticks(4)).join('line')
            .attr('x1', 0).attr('x2', iW)
            .attr('y1', d => y(d)).attr('y2', d => y(d))
            .attr('stroke', '#E3E0DB');
        axesG.append('line').attr('x1', 0).attr('x2', iW)
            .attr('y1', y(0)).attr('y2', y(0)).attr('stroke', '#D0CDC7');
        axesG.append('g').attr('transform', `translate(0,${iH})`)
            .call(d3.axisBottom(x).ticks(6).tickFormat(d => d + ' s'))
            .call(styleAxis);
        axesG.append('g').call(d3.axisLeft(y).ticks(5)).call(styleAxis);
        axisLabel(axesG, 'Tijd na oorsprong (s)', 'Grondsnelheid (mm/s)');

        // Waveform
        const waveG = g.append('g').attr('class', 'vel-wave-layer');
        const path = waveG.append('path').datum(data)
            .attr('fill', 'none').attr('stroke', COLORS.vel).attr('stroke-width', 2)
            .attr('d', d3.line().x((d, i) => x(w.times[i])).y(d => y(d)));

        // Draw animation
        const len = path.node().getTotalLength();
        path.attr('stroke-dasharray', len).attr('stroke-dashoffset', len)
            .transition().duration(1500).ease(d3.easeCubicOut)
            .attr('stroke-dashoffset', 0);

        // Store scales for PGV annotation
        g.datum({ velX: x, velY: y });

        if (withAnnotation) {
            addPGVAnnotation(g, x, y, 1600);
        }
    }

    function addPGVAnnotation(g, x, y, delay) {
        const w = DATA.waveform;
        const px = x(w.pgv.time);
        const py = y(w.pgv.signed_value);

        const ann = g.append('g').attr('class', 'pgv-annotation').attr('opacity', 0);
        ann.append('line')
            .attr('x1', px).attr('x2', px).attr('y1', 0).attr('y2', iH)
            .attr('stroke', COLORS.vel).attr('stroke-dasharray', '5,3').attr('opacity', 0.4);
        ann.append('line')
            .attr('x1', 0).attr('x2', px).attr('y1', py).attr('y2', py)
            .attr('stroke', COLORS.vel).attr('stroke-dasharray', '5,3').attr('opacity', 0.3);
        ann.append('circle')
            .attr('cx', px).attr('cy', py).attr('r', 7)
            .attr('fill', COLORS.vel).attr('stroke', '#fff').attr('stroke-width', 2.5);
        ann.append('text')
            .attr('x', px + 12).attr('y', py - 10)
            .attr('font-size', '14px').attr('font-weight', '700').attr('fill', COLORS.vel)
            .attr('font-family', 'var(--font)')
            .text('PGV = 10 mm/s');

        ann.transition().delay(delay || 0).duration(500).attr('opacity', 1);
    }

    // vel-waveform → pgv-punt: add PGV annotation
    function fwdVelToPGV(g) {
        const d = g.datum();
        if (d && d.velX && d.velY) {
            addPGVAnnotation(g, d.velX, d.velY, 0);
        } else {
            // Fallback: recompute scales
            const w = DATA.waveform;
            const x = d3.scaleLinear().domain(d3.extent(w.times)).range([0, iW]);
            const yAbs = d3.max(w.velocity, d => Math.abs(d)) * 1.15;
            const y = d3.scaleLinear().domain([-yAbs, yAbs]).range([iH, 0]);
            addPGVAnnotation(g, x, y, 0);
        }
    }

    // pgv-punt → sparklines: waveform shrinks to G140 cell, others draw in
    function fwdPGVToSparklines(g) {
        const stations = [...DATA.miniWaveforms].sort((a, b) => a.distance_km - b.distance_km);
        const cols = 5, rows = 4, headerH = 22;
        const cellW = iW / cols, cellH = (iH - headerH) / rows;
        const pad = 4, cw = cellW - pad * 2, ch = cellH - pad * 2;
        const globalMaxAbs = d3.max(stations, st =>
            d3.max(st.velocity, d => Math.abs(d))) || 1;
        const binned = [[], [], [], [], []];
        stations.forEach(st => binned[st.bin_index].push(st));

        // G140 grid position
        const g140 = stations.find(s => s.station_id === 'G140');
        const g140Col = g140 ? g140.bin_index : 0;
        const g140Row = g140 ? binned[g140Col].indexOf(g140) : 1;
        const g140cx = g140Col * cellW + pad;
        const g140cy = headerH + g140Row * cellH + pad;

        // Downsample full waveform to 200 pts for path morphing
        const hero = downsamplePeaks(DATA.waveform.velocity, DATA.waveform.times, 200);
        const heroPeak = d3.max(hero.values, d => Math.abs(d)) * 1.15;
        const bigSx = d3.scaleLinear().domain(d3.extent(hero.times)).range([0, iW]);
        const bigSy = d3.scaleLinear().domain([-heroPeak, heroPeak]).range([iH, 0]);
        const smallSx = d3.scaleLinear().domain(d3.extent(hero.times))
            .range([g140cx + 4, g140cx + cw - 4]);
        const smallSy = d3.scaleLinear().domain([-globalMaxAbs, globalMaxAbs])
            .range([g140cy + ch * 0.82, g140cy + ch * 0.18]);
        const bigLine = d3.line().x((d, i) => bigSx(hero.times[i])).y(d => bigSy(d));
        const smallLine = d3.line().x((d, i) => smallSx(hero.times[i])).y(d => smallSy(d));

        // 1. Fade out annotation + axes
        g.select('.pgv-annotation')
            .transition().duration(300).attr('opacity', 0)
            .on('end', function() { d3.select(this).remove(); });
        g.select('.axes-layer')
            .transition().duration(400).attr('opacity', 0)
            .on('end', function() { d3.select(this).remove(); });

        // 2. Swap waveform to 200-pt version at same visual position
        const waveLayer = g.select('.vel-wave-layer');
        waveLayer.select('path').remove();
        const heroPath = waveLayer.append('path')
            .datum(hero.values)
            .attr('fill', 'none').attr('stroke', COLORS.vel).attr('stroke-width', 2)
            .attr('d', bigLine).attr('stroke-dasharray', 'none');

        // G140 cell background appears behind
        g.insert('rect', '.vel-wave-layer')
            .attr('class', 'g140-bg')
            .attr('x', g140cx).attr('y', g140cy)
            .attr('width', cw).attr('height', ch)
            .attr('rx', 4).attr('fill', '#fff').attr('stroke', '#E3E0DB')
            .attr('opacity', 0)
            .transition().delay(300).duration(400).attr('opacity', 1);

        // Morph waveform into G140 cell
        heroPath.transition()
            .delay(300).duration(900).ease(d3.easeCubicInOut)
            .attr('d', smallLine).attr('stroke-width', 1.3);

        // 3. After morph: build full sparklines with draw animations
        const morphEnd = 1300;
        setTimeout(() => {
            waveLayer.remove();
            g.select('.g140-bg').remove();
            buildSparklineCells(g, stations, binned, cols, rows, headerH,
                cellW, cellH, pad, cw, ch, globalMaxAbs, 'morph');
        }, morphEnd);
    }

    // ── Sparklines state ───────────────────────────────────────────
    const BIN_LABELS_KM = ['0–5 km', '5–10 km', '10–20 km', '20–30 km', '30–50 km'];

    function drawSparklinesFull(g) {
        const stations = [...DATA.miniWaveforms].sort((a, b) => a.distance_km - b.distance_km);
        const cols = 5, rows = 4, headerH = 22;
        const cellW = iW / cols, cellH = (iH - headerH) / rows;
        const pad = 4, cw = cellW - pad * 2, ch = cellH - pad * 2;
        const globalMaxAbs = d3.max(stations, st =>
            d3.max(st.velocity, d => Math.abs(d))) || 1;
        const binned = [[], [], [], [], []];
        stations.forEach(st => binned[st.bin_index].push(st));
        buildSparklineCells(g, stations, binned, 5, 4, 22,
            cellW, cellH, pad, cw, ch, globalMaxAbs, false);
    }

    // Shared: build sparkline grid
    // mode: false = instant, 'morph' = G140 stays + others animate, 'reveal' = all animate
    function buildSparklineCells(g, stations, binned, cols, rows, headerH,
            cellW, cellH, pad, cw, ch, globalMaxAbs, mode) {
        const animated = mode === 'morph' || mode === 'reveal';
        // Column headers
        const headersG = g.append('g').attr('class', 'sparkline-headers')
            .attr('opacity', animated ? 0 : 1);
        BIN_LABELS_KM.forEach((label, ci) => {
            headersG.append('text')
                .attr('x', ci * cellW + cellW / 2).attr('y', 14)
                .attr('text-anchor', 'middle')
                .attr('font-size', '10px').attr('font-weight', '700')
                .attr('fill', COLORS.muted).text(label);
        });
        if (animated) headersG.transition().duration(400).attr('opacity', 1);

        // Cells + PGV dots
        const cellsG = g.append('g').attr('class', 'sparkline-cells');
        const pgvDotsG = g.append('g').attr('class', 'pgv-dots-layer');

        let cellIdx = 0;
        binned.forEach((binStations, col) => {
            binStations.forEach((st, row) => {
                const idx = cellIdx++;
                const cx = col * cellW + pad;
                const cy = headerH + row * cellH + pad;
                const isG140 = st.station_id === 'G140';
                // In morph mode, G140 is already visible (morphed from single waveform)
                const skipAnim = mode === 'morph' && isG140;

                const cell = cellsG.append('g')
                    .attr('transform', `translate(${cx},${cy})`)
                    .attr('opacity', (animated && !skipAnim) ? 0 : 1);

                cell.append('rect')
                    .attr('width', cw).attr('height', ch).attr('rx', 4)
                    .attr('fill', '#fff').attr('stroke', '#E3E0DB');

                const vel = st.velocity, times = st.times;
                const sx = d3.scaleLinear().domain(d3.extent(times)).range([4, cw - 4]);
                const sy = d3.scaleLinear().domain([-globalMaxAbs, globalMaxAbs])
                    .range([ch * 0.82, ch * 0.18]);

                const wavePath = cell.append('path').datum(vel)
                    .attr('fill', 'none').attr('stroke', COLORS.vel).attr('stroke-width', 1.3)
                    .attr('d', d3.line().x((d, j) => sx(times[j])).y(d => sy(d)));

                // Draw animation: waveform traces in
                const pathLen = wavePath.node().getTotalLength();
                if (animated && !skipAnim) {
                    wavePath
                        .attr('stroke-dasharray', pathLen)
                        .attr('stroke-dashoffset', pathLen)
                        .transition()
                        .delay(idx * 50 + 200)
                        .duration(800)
                        .ease(d3.easeCubicOut)
                        .attr('stroke-dashoffset', 0);
                }

                cell.append('text').attr('x', 6).attr('y', 13)
                    .attr('font-size', '8px').attr('font-weight', '600').attr('fill', COLORS.muted)
                    .text(`${st.station_id} · ${st.distance_km.toFixed(1)} km`);
                cell.append('text').attr('x', cw - 4).attr('y', ch - 4)
                    .attr('text-anchor', 'end')
                    .attr('font-size', '9px').attr('font-weight', '700').attr('fill', COLORS.vel)
                    .text(`${st.pgv_mms.toFixed(1)} mm/s`);

                // Staggered fade-in for animated cells
                if (animated && !skipAnim) {
                    cell.transition().delay(idx * 50).duration(400).attr('opacity', 1);
                }

                // PGV dot (hidden, for sparklines→scatter transition)
                // Use Zeerijp CSV data for scatter positioning (distances differ from FDSN metadata)
                let peakIdx = 0;
                for (let j = 1; j < vel.length; j++) {
                    if (Math.abs(vel[j]) > Math.abs(vel[peakIdx])) peakIdx = j;
                }
                const csvMatch = DATA.zeerijp.stations.find(s => s.station_id === st.station_id);
                pgvDotsG.append('circle')
                    .datum({
                        dist: csvMatch ? csvMatch.dist : st.distance_km,
                        pgv: csvMatch ? csvMatch.pgv : st.pgv_mms,
                        station_id: st.station_id, bin: st.bin_index,
                        srcX: cx + sx(times[peakIdx]),
                        srcY: cy + sy(vel[peakIdx]),
                    })
                    .attr('class', 'pgv-dot')
                    .attr('cx', cx + sx(times[peakIdx]))
                    .attr('cy', cy + sy(vel[peakIdx]))
                    .attr('r', 0).attr('fill', COLORS.vel).attr('opacity', 0);
            });
        });
    }

    // sparklines → scatter: waveforms collapse to PGV dots, fly to scatter
    function fwdSparklinesToScatter(g) {
        // 1. Highlight PGV dots on each waveform
        g.select('.pgv-dots-layer').selectAll('.pgv-dot')
            .transition().duration(400)
            .attr('r', 5).attr('opacity', 1)
            .attr('stroke', '#fff').attr('stroke-width', 2);

        // 2. Fade out sparkline cells + headers
        g.select('.sparkline-cells')
            .transition().delay(300).duration(500).attr('opacity', 0)
            .on('end', function() { d3.select(this).remove(); });
        g.select('.sparkline-headers')
            .transition().delay(300).duration(500).attr('opacity', 0)
            .on('end', function() { d3.select(this).remove(); });

        // 3. Fade in log-log axes
        const axesG = g.append('g').attr('class', 'axes-layer').attr('opacity', 0);
        drawLogAxes(axesG, scatX, sharedY);
        axisLabel(axesG, 'Afstand tot epicentrum (km)', 'PGV (mm/s)');
        axesG.transition().delay(600).duration(500).attr('opacity', 1);

        // 4. Fly PGV dots to scatter positions
        g.select('.pgv-dots-layer').selectAll('.pgv-dot')
            .transition().delay(700).duration(900).ease(d3.easeCubicInOut)
            .attr('cx', d => scatX(d.dist))
            .attr('cy', d => sharedY(Math.max(d.pgv, 0.01)))
            .attr('r', 4).attr('stroke-width', 0).attr('opacity', 0.7);

        // 5. After flying, add remaining scatter dots
        setTimeout(() => {
            // Convert pgv-dots layer to dots-layer
            const layer = g.select('.pgv-dots-layer').attr('class', 'dots-layer');
            const existingIds = new Set();
            layer.selectAll('.pgv-dot').each(function(d) {
                existingIds.add(d.station_id);
            });

            // Restyle landed dots as scatter dots
            layer.selectAll('.pgv-dot')
                .attr('class', 'scatter-dot dot-ev-0')
                .attr('r', 3.5).attr('opacity', 0.55)
                .each(function(d) { d.eventIdx = 0; d.eventName = DATA.zeerijp.name; })
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('r', 6).attr('opacity', 1);
                    showTip(`<b>${d.station_id}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event);
                })
                .on('mousemove', (event, d) =>
                    showTip(`<b>${d.station_id}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event))
                .on('mouseleave', function(event) {
                    d3.select(this).attr('r', 3.5).attr('opacity', 0.55); hideTip(event);
                });

            // Add remaining Zeerijp stations
            const remaining = DATA.zeerijp.stations.filter(s => !existingIds.has(s.station_id));
            layer.selectAll('.remaining')
                .data(remaining.map(s => ({
                    ...s, eventIdx: 0, eventName: DATA.zeerijp.name,
                    bin: getBinIndex(s.dist)
                })))
                .join('circle')
                .attr('class', 'scatter-dot dot-ev-0')
                .attr('cx', d => scatX(d.dist))
                .attr('cy', d => sharedY(Math.max(d.pgv, 0.01)))
                .attr('r', 0).attr('fill', COLORS.nl).attr('opacity', 0)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('r', 6).attr('opacity', 1);
                    showTip(`<b>${d.station_id || ''}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event);
                })
                .on('mousemove', (event, d) =>
                    showTip(`<b>${d.station_id || ''}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event))
                .on('mouseleave', function(event) {
                    d3.select(this).attr('r', 3.5).attr('opacity', 0.55); hideTip(event);
                })
                .transition().duration(500)
                .attr('r', 3.5).attr('opacity', 0.55);
        }, 1700);
    }

    // ── Scatter state (one or three events) ─────────────────────────
    function drawScatterFull(g, allEvents) {
        const axesG = g.append('g').attr('class', 'axes-layer');
        drawLogAxes(axesG, scatX, sharedY);
        axisLabel(axesG, 'Afstand tot epicentrum (km)', 'PGV (mm/s)');

        const dotsG = g.append('g').attr('class', 'dots-layer');
        const events = allEvents ? DATA.groningenEvents : [DATA.zeerijp];
        events.forEach((ev, ei) => {
            const color = allEvents ? EVENT_COLORS[ei] : COLORS.nl;
            const opac = allEvents ? 0.5 : 0.55;
            addDots(dotsG, ev.stations, ei, ev.name, color, opac, scatX, allEvents);
        });

        if (allEvents) {
            showLegend(activeChartEl, DATA.groningenEvents.map((ev, i) => ({
                color: EVENT_COLORS[i], label: ev.name
            })));
        }
    }

    function addDots(container, stations, evIdx, evName, color, opac, xScale, showEvent) {
        container.selectAll(`.dot-ev-${evIdx}`)
            .data(stations.map(s => ({
                ...s, eventIdx: evIdx, eventName: evName,
                bin: getBinIndex(s.dist)
            })))
            .join('circle')
            .attr('class', `scatter-dot dot-ev-${evIdx}`)
            .attr('cx', d => xScale(d.dist))
            .attr('cy', d => sharedY(Math.max(d.pgv, 0.01)))
            .attr('r', 3.5)
            .attr('fill', color)
            .attr('opacity', opac)
            .style('cursor', 'pointer')
            .on('mouseenter', function(event, d) {
                d3.select(this).attr('r', 6).attr('opacity', 1);
                const lbl = showEvent ? d.eventName : (d.station_id || '');
                showTip(`<b>${lbl}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event);
            })
            .on('mousemove', (event, d) => {
                const lbl = showEvent ? d.eventName : (d.station_id || '');
                showTip(`<b>${lbl}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event);
            })
            .on('mouseleave', function(event) {
                d3.select(this).attr('r', 3.5).attr('opacity', opac);
                hideTip(event);
            });
    }

    // ── Forward transitions ─────────────────────────────────────────
    function forwardTransition(from, to) {
        // Going to map is handled by activateStep early return
        if (to === 'kaart') return;
        // Map → sparklines: animated dot transition
        if (from === 'kaart' && to === 'sparklines') { fwdMapToSparklines(); return; }
        // Coming from map to anything else
        if (from === 'kaart') { crossfadeRedraw(to); return; }

        const g = svgEl.select('.scrolly-group');
        if (g.empty()) { crossfadeRedraw(to); return; }

        if (from === 'vel-waveform' && to === 'pgv-punt') {
            fwdVelToPGV(g);
        } else if (from === 'sparklines' && to === 'scatter') {
            fwdSparklinesToScatter(g);
        } else if (from === 'scatter' && to === 'drie-bevingen') {
            fwdScatterToThree(g);
        } else if (from === 'drie-bevingen' && to === 'boxplots') {
            fwdThreeToBox(g);
        } else {
            crossfadeRedraw(to);
        }
    }

    // scatter → drie-bevingen: add two event clouds in same chart
    function fwdScatterToThree(g) {
        const dotsG = g.select('.dots-layer');

        // Recolor existing GRN_24 dots
        dotsG.selectAll('.dot-ev-0')
            .transition().duration(300)
            .attr('fill', EVENT_COLORS[0]);

        // Add GRN_26 + GRN_35
        [1, 2].forEach(ei => {
            const ev = DATA.groningenEvents[ei];
            dotsG.selectAll(`.dot-ev-${ei}`)
                .data(ev.stations.map(s => ({
                    ...s, eventIdx: ei, eventName: ev.name,
                    bin: getBinIndex(s.dist)
                })))
                .join('circle')
                .attr('class', `scatter-dot dot-ev-${ei}`)
                .attr('cx', d => scatX(d.dist))
                .attr('cy', d => sharedY(Math.max(d.pgv, 0.01)))
                .attr('r', 0)
                .attr('fill', EVENT_COLORS[ei])
                .attr('opacity', 0.5)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('r', 6).attr('opacity', 1);
                    showTip(`<b>${d.eventName}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event);
                })
                .on('mousemove', (event, d) =>
                    showTip(`<b>${d.eventName}</b><br>${d.dist.toFixed(1)} km<br>${d.pgv.toFixed(2)} mm/s`, event))
                .on('mouseleave', function(event) {
                    d3.select(this).attr('r', 3.5).attr('opacity', 0.5);
                    hideTip(event);
                })
                .transition().delay(ei * 300).duration(500).attr('r', 3);
        });

        showLegend(activeChartEl, DATA.groningenEvents.map((ev, i) => ({
            color: EVENT_COLORS[i], label: ev.name
        })));
    }

    // drie-bevingen → boxplots: dots fly into distance bins
    function fwdThreeToBox(g) {
        // 1. Fade out scatter axes
        g.select('.axes-layer')
            .transition().duration(400).attr('opacity', 0)
            .on('end', function() { d3.select(this).remove(); });

        // 2. Animate dots to jittered bin positions
        g.select('.dots-layer').selectAll('.scatter-dot')
            .transition()
            .delay((d, i) => 150 + Math.min(i * 2, 300))
            .duration(800)
            .ease(d3.easeCubicInOut)
            .attr('cx', d => {
                const bx = boxX(BIN_LABELS[d.bin]);
                const bw = boxX.bandwidth();
                const hash = ((d.dist * 1000 + d.pgv * 100) % 1);
                return bx + bw * 0.15 + hash * bw * 0.7;
            })
            .attr('cy', d => sharedY(Math.max(d.pgv, 0.01)))
            .attr('r', 2)
            .attr('fill', COLORS.nl)
            .attr('opacity', 0.2);

        // 3. Draw box axes + geometry after dots settle
        setTimeout(() => {
            const axesG = g.append('g').attr('class', 'axes-layer').attr('opacity', 0);
            axesG.append('g')
                .attr('transform', `translate(0,${iH})`)
                .call(d3.axisBottom(boxX))
                .call(styleAxis);
            drawBoxYAxis(axesG, sharedY);
            axisLabel(axesG, 'Afstand (km)', 'PGV (mm/s)');
            axesG.transition().duration(400).attr('opacity', 1);

            // Box column geometry
            drawBoxColumn(g, DATA.boxPlots.countries.Netherlands.bins,
                DATA.boxPlots.bins, boxX, sharedY, COLORS.nl, 200);
        }, 800);
    }

    // ── Observers ───────────────────────────────────────────────────
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                activateStep(entry.target.dataset.step);
            }
        });
    }, { rootMargin: '-25% 0px -45% 0px' });

    steps.forEach(step => observer.observe(step));

    // Pre-draw first chart when scrolly section enters
    const sectionObs = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
            activateStep('vel-waveform');
            sectionObs.disconnect();
        }
    }, { threshold: 0.05 });
    sectionObs.observe(document.getElementById('scrolly'));
}

// ── Tooltip helpers ─────────────────────────────────────────────────────────
// Walk from an SVG element up to the .inline-chart container
function chartFor(el) {
    let node = el;
    while (node && node !== document.body) {
        if (node.classList && (node.classList.contains('inline-chart') || node.classList.contains('scrolly-chart'))) return node;
        node = node.parentNode;
    }
    return activeChartEl;
}

function showTip(html, event) {
    const chart = chartFor(event.target);
    const tip = chart && chart.querySelector('.tooltip');
    if (!tip) return;
    tip.innerHTML = html;
    tip.style.opacity = 1;
    const rect = chart.getBoundingClientRect();
    const x = event.clientX - rect.left + 12;
    const y = event.clientY - rect.top - 10;
    tip.style.left = (x + tip.offsetWidth > rect.width ? x - tip.offsetWidth - 24 : x) + 'px';
    tip.style.top = y + 'px';
}

function hideTip(event) {
    const chart = event ? chartFor(event.target) : activeChartEl;
    if (!chart) return;
    const tip = chart.querySelector('.tooltip');
    if (tip) tip.style.opacity = 0;
}

// ── Inline waveforms (acceleration + velocity) ──────────────────────────────
function drawInlineWaveforms(w) {
    const W = 800, H = 360;
    const m = { top: 30, right: 25, bottom: 45, left: 55 };
    const cw = W - m.left - m.right;
    const ch = H - m.top - m.bottom;

    function drawOne(containerId, data, peak, unit, color, peakLabel, yLabel) {
        const container = document.getElementById(containerId);
        const tipEl = container.querySelector('.tooltip');

        const svgEl = d3.select(container).select('svg')
            .attr('viewBox', `0 0 ${W} ${H}`);

        const g = svgEl.append('g').attr('transform', `translate(${m.left},${m.top})`);

        const x = d3.scaleLinear().domain(d3.extent(w.times)).range([0, cw]);
        const yAbs = d3.max(data, d => Math.abs(d)) * 1.15;
        const y = d3.scaleLinear().domain([-yAbs, yAbs]).range([ch, 0]);

        // Grid
        g.selectAll('.grid').data(y.ticks(4)).join('line')
            .attr('x1', 0).attr('x2', cw)
            .attr('y1', d => y(d)).attr('y2', d => y(d))
            .attr('stroke', '#E3E0DB');

        // Zero line
        g.append('line').attr('x1', 0).attr('x2', cw)
            .attr('y1', y(0)).attr('y2', y(0))
            .attr('stroke', '#D0CDC7');

        // Waveform path
        const path = g.append('path')
            .datum(data)
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', 2)
            .attr('d', d3.line().x((d, i) => x(w.times[i])).y(d => y(d)));

        // Peak annotation (hidden initially)
        const px = x(peak.time);
        const py = y(peak.signed_value);

        const ann = g.append('g').attr('opacity', 0);
        ann.append('line')
            .attr('x1', px).attr('x2', px).attr('y1', 0).attr('y2', ch)
            .attr('stroke', color).attr('stroke-dasharray', '5,3').attr('opacity', 0.4);
        ann.append('line')
            .attr('x1', 0).attr('x2', px).attr('y1', py).attr('y2', py)
            .attr('stroke', color).attr('stroke-dasharray', '5,3').attr('opacity', 0.3);
        ann.append('circle')
            .attr('cx', px).attr('cy', py).attr('r', 7)
            .attr('fill', color).attr('stroke', '#fff').attr('stroke-width', 2.5);
        ann.append('text')
            .attr('x', px + 12).attr('y', py - 10)
            .attr('font-size', '13px').attr('font-weight', '700').attr('fill', color)
            .attr('font-family', 'var(--font)')
            .text(peakLabel);

        // Axes
        g.append('g').attr('transform', `translate(0,${ch})`)
            .call(d3.axisBottom(x).ticks(6).tickFormat(d => d + ' s'))
            .call(styleAxis);
        g.append('g')
            .call(d3.axisLeft(y).ticks(5))
            .call(styleAxis);

        // Axis labels
        g.append('text')
            .attr('x', cw / 2).attr('y', ch + 38)
            .attr('text-anchor', 'middle')
            .attr('font-size', '12px').attr('fill', '#5A5A5A')
            .attr('font-family', 'var(--font)')
            .text('Tijd na oorsprong (s)');
        g.append('text')
            .attr('transform', 'rotate(-90)')
            .attr('x', -ch / 2).attr('y', -40)
            .attr('text-anchor', 'middle')
            .attr('font-size', '12px').attr('fill', '#5A5A5A')
            .attr('font-family', 'var(--font)')
            .text(yLabel);

        // Mouseover crosshair
        const hoverLine = g.append('line')
            .attr('y1', 0).attr('y2', ch)
            .attr('stroke', '#999').attr('stroke-dasharray', '3,3').attr('opacity', 0);
        const hoverDot = g.append('circle')
            .attr('r', 4).attr('fill', color).attr('stroke', '#fff').attr('stroke-width', 1.5).attr('opacity', 0);

        g.append('rect')
            .attr('width', cw).attr('height', ch).attr('fill', 'none').attr('pointer-events', 'all')
            .on('mousemove', function(event) {
                const [mx] = d3.pointer(event);
                const t = x.invert(mx);
                let ci = d3.bisector(d => d).left(w.times, t);
                ci = Math.max(0, Math.min(ci, data.length - 1));
                const val = data[ci];
                hoverLine.attr('x1', x(w.times[ci])).attr('x2', x(w.times[ci])).attr('opacity', 0.5);
                hoverDot.attr('cx', x(w.times[ci])).attr('cy', y(val)).attr('opacity', 1);
                tipEl.innerHTML = `<b>${w.times[ci].toFixed(2)} s</b><br>${val.toFixed(2)} ${unit}`;
                tipEl.style.opacity = 1;
                const rect = container.getBoundingClientRect();
                const tx = event.clientX - rect.left + 12;
                const ty = event.clientY - rect.top - 10;
                tipEl.style.left = (tx + tipEl.offsetWidth > rect.width ? tx - tipEl.offsetWidth - 24 : tx) + 'px';
                tipEl.style.top = ty + 'px';
            })
            .on('mouseleave', () => {
                hoverLine.attr('opacity', 0);
                hoverDot.attr('opacity', 0);
                tipEl.style.opacity = 0;
            });

        // Trigger draw animation once on scroll into view
        // (visibility toggling handled by revealObserver)
        const len = path.node().getTotalLength();
        path.attr('stroke-dasharray', len).attr('stroke-dashoffset', len);

        const obs = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) {
                setTimeout(() => {
                    path.transition().duration(1500).ease(d3.easeCubicOut)
                        .attr('stroke-dashoffset', 0);
                    ann.transition().delay(1600).duration(500).attr('opacity', 1);
                }, 300);
                obs.disconnect();
            }
        }, { threshold: 0.15 });
        obs.observe(container);
    }

    drawOne('inline-acc', w.acceleration, w.pga, w.acc_unit, COLORS.acc,
            `PGA = ${w.pga.value.toFixed(1)} ${w.acc_unit}`,
            `Grondversnelling (${w.acc_unit})`);
}
